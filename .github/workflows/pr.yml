name: PR Build Validation

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  UNITY_VERSION: "6000.3.13f1"
  UNITY_EXECUTABLE: "C:/Program Files/Unity/Hub/Editor/6000.3.13f1/Editor/Unity.exe"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (Windows + WebGL)
    runs-on: [self-hosted, unity-builder]

    steps:
      - name: Kill stale processes
        shell: powershell
        run: |
          Get-Process -Name git, git-remote-https -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-ChildItem "$env:RUNNER_TEMP" -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          clean: false

      - name: Build Windows
        shell: pwsh
        run: |
          & "$env:UNITY_EXECUTABLE" `
            -batchmode -nographics -quit `
            -projectPath "$env:GITHUB_WORKSPACE" `
            -executeMethod JamTemplate.Editor.BatchBuild.BuildWindows `
            -logFile "$env:GITHUB_WORKSPACE/Build/windows_build.log"
          if ($LASTEXITCODE -ne 0) {
            Get-Content "$env:GITHUB_WORKSPACE/Build/windows_build.log" -Tail 50
            throw "Windows build failed with exit code $LASTEXITCODE"
          }

      - name: Build WebGL
        shell: pwsh
        run: |
          & "$env:UNITY_EXECUTABLE" `
            -batchmode -nographics -quit `
            -buildTarget WebGL `
            -projectPath "$env:GITHUB_WORKSPACE" `
            -executeMethod JamTemplate.Editor.BatchBuild.BuildWebGL `
            -logFile "$env:GITHUB_WORKSPACE/Build/webgl_build.log"
          if ($LASTEXITCODE -ne 0) {
            Get-Content "$env:GITHUB_WORKSPACE/Build/webgl_build.log" -Tail 50
            throw "WebGL build failed with exit code $LASTEXITCODE"
          }

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: Build/*.log
          retention-days: 7
